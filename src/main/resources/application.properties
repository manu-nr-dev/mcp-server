spring.application.name=mcp-tools-server
server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5432/agent_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=pguser
spring.datasource.password=${db.password}

spring.ai.mcp.server.name=mcp-tools-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC

management.server.port=8084
management.endpoints.web.exposure.include=health,mappings,beans

logging.level.io.modelcontextprotocol=TRACE
logging.level.org.springframework.ai.mcp=DEBUG

spring.main.web-application-type=reactive
spring.main.allow-bean-definition-overriding=true